<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUNT | 소식</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    background:#1b1b1b;
    padding:20px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    border-bottom:1px solid #333;
}

.container{
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

.news-card{
    background:#1e1e1e;
    border-radius:15px;
    padding:25px;
    margin-bottom:25px;
    transition:.25s;
}

.news-card:hover{
    transform:translateY(-5px);
}

.news-date{
    color:#888;
    margin-bottom:10px;
}

.news-title{
    font-size:28px;
    margin-bottom:15px;
}

.news-text{
    color:#ddd;
    line-height:1.8;
}

.home-btn{
    display:inline-block;
    margin-top:40px;
    padding:15px 30px;
    background:#2d3436;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.home-btn:hover{
    background:#3b4346;
}
</style>

</head>

<body>

<header>
📰 HUNT 소식
</header>

<div class="container">

<div class="news-card">
<div class="news-date">2026-07-20</div>
<div class="news-title">🎉 HUNT 공식 홈페이지 오픈!</div>
<div class="news-text">
HUNT 공식 홈페이지가 공개되었습니다.<br>
앞으로 업데이트, 이벤트, 공지사항을 이곳에서 확인할 수 있습니다.
</div>
</div>

<div class="news-card">
<div class="news-date">예정</div>
<div class="news-title">🦌 새로운 동물 추가</div>
<div class="news-text">
새로운 동물과 사냥 지역이 업데이트될 예정입니다.
</div>
</div>

<div class="news-card">
<div class="news-date">예정</div>
<div class="news-title">🗺️ 신규 지역</div>
<div class="news-text">
새로운 섬과 숨겨진 장소가 추가될 예정입니다.
</div>
</div>

<div class="news-card">
<div class="news-date">예정</div>
<div class="news-title">⚔️ 신규 무기</div>
<div class="news-text">
새로운 무기와 아이템이 추가될 예정입니다.
</div>
</div>

<a href="index.html" class="home-btn">
🏠 홈으로
</a>

</div>

</body>
</html>
