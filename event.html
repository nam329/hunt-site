<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HUNT Events</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

background:#090909;

color:white;

font-family:Arial,sans-serif;

padding-bottom:250px;

}


/* 제목 */

.header{

text-align:center;

font-size:32px;

font-weight:bold;

padding:30px;

}


/* 검색 */

.search-box{

width:92%;

margin:auto;

}


.search-box input{

width:100%;

padding:15px;

border-radius:12px;

border:0;

background:#222;

color:white;

font-size:17px;

}





/* 섹션 */

.section{

width:92%;

margin:35px auto;

}


.title{

font-size:25px;

font-weight:bold;

color:#00ff66;

margin-bottom:15px;

}





/* 카드 */

.event-grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:10px;

}



.card{

background:#171717;

border-radius:12px;

overflow:hidden;

cursor:pointer;

}



.card img{

width:100%;

height:120px;

object-fit:cover;

}



.card-info{

padding:10px;

font-size:14px;

font-weight:bold;

}



.card-info span{

display:block;

margin-top:8px;

color:#00ff66;

}





/* 접기 */

.toggle{

width:100%;

padding:14px;

border:0;

border-radius:10px;

background:#222;

color:white;

font-size:16px;

font-weight:bold;

margin-bottom:15px;

}





/* 패치노트 */

.patch{

background:#171717;

padding:20px;

border-radius:15px;

line-height:1.8;

}



.version{

color:#00ff66;

font-size:20px;

font-weight:bold;

}





/* 상세창 */

.modal{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.8);

align-items:center;

justify-content:center;

z-index:999;

}



.modal-box{

width:90%;

max-height:80vh;

overflow:auto;

background:#171717;

border-radius:20px;

padding:20px;

}



.modal-box img{

width:100%;

height:230px;

object-fit:cover;

border-radius:15px;

}



.close{

float:right;

background:red;

color:white;

border:0;

padding:10px;

border-radius:10px;

}



</style>

</head>



<body>



<div class="header">

🎉 HUNT EVENTS

</div>



<div class="search-box">

<input id="search"

placeholder="🔍 이벤트 검색">

</div>





<!-- 카운트다운 -->


<div class="section">


<div class="title">

⏳ 카운트다운 이벤트

</div>



<div class="event-grid">



<div class="card"

data-title="🌊 심해 메갈로돈 이벤트"

data-date="2026.08.01 ~ 2026.08.20"

data-text="심해 보스 메갈로돈을 사냥하는 이벤트입니다.">

<img src="images/event1.jpg">


<div class="card-info">

🌊 심해 이벤트

<span>

D-20

</span>

</div>

</div>





<div class="card"

data-title="🔥 화산 이벤트"

data-date="2026.09.01 ~ 2026.09.20"

data-text="화산 지역 특별 이벤트">

<img src="images/event2.jpg">


<div class="card-info">

🔥 화산 이벤트

<span>

D-40

</span>

</div>

</div>





<div class="card"

data-title="❄️ 겨울 이벤트"

data-date="2026.12.01"

data-text="겨울 시즌 이벤트">

<img src="images/event3.jpg">


<div class="card-info">

❄️ 겨울 이벤트

<span>

D-100

</span>

</div>

</div>


</div>


</div>






<!-- 사냥 이벤트 -->


<div class="section">


<div class="title">

🦖 사냥 이벤트

</div>


<div class="event-grid">


<div class="card"

data-title="메갈로돈 사냥"

data-date="상시"

data-text="전설 생물 사냥 이벤트">


<img src="images/hunt1.jpg">


<div class="card-info">

메갈로돈

</div>

</div>



<div class="card"

data-title="거대 몬스터"

data-date="상시"

data-text="보스 사냥">


<img src="images/hunt2.jpg">


<div class="card-info">

거대 몬스터

</div>

</div>




<div class="card"

data-title="전설 생물"

data-date="상시"

data-text="희귀 생물">


<img src="images/hunt3.jpg">


<div class="card-info">

전설 생물

</div>

</div>



</div>


</div>





<!-- 지역 행사 -->


<div class="section">


<div class="title">

🗺️ 지역 행사

</div>



<button class="toggle">

▼ 펼치기

</button>


<div class="region" style="display:none">


지역별 특별 이벤트

<br><br>

🏝 시작섬

<br>

🌋 화산섬

<br>

❄ 북극 지역


</div>


</div>





<!-- 패치노트 -->


<div class="section">


<div class="title">

📝 패치노트

</div>


<div class="patch">


<div class="version">

v1.0.0

</div>


<br>

- 이벤트 페이지 추가

<br>

- 검색 기능 추가

<br>

- 상세보기 추가


</div>


</div>







<!-- 상세창 -->


<div class="modal" id="modal">


<div class="modal-box">


<button class="close">

X

</button>


<img id="modalImg">


<h2 id="modalTitle"></h2>


<p id="modalDate"></p>


<p id="modalText"></p>



</div>


</div>







<script>


// 검색

const search =
document.getElementById("search");


const cards =
document.querySelectorAll(".card");



search.addEventListener("input",()=>{


let word =
search.value.toLowerCase();



cards.forEach(card=>{


if(card.innerText.toLowerCase().includes(word)){


card.style.display="block";


}

else{


card.style.display="none";


}


});


});





// 지역 행사 접기

document.querySelector(".toggle")
.onclick=()=>{


let box=document.querySelector(".region");


if(box.style.display=="none"){

box.style.display="block";

document.querySelector(".toggle").innerHTML="▲ 접기";

}

else{

box.style.display="none";

document.querySelector(".toggle").innerHTML="▼ 펼치기";

}


};







// 상세창


const modal =
document.getElementById("modal");


cards.forEach(card=>{


card.onclick=()=>{


modal.style.display="flex";


document.getElementById("modalImg").src=
card.querySelector("img").src;


document.getElementById("modalTitle").innerHTML=
card.dataset.title;


document.getElementById("modalDate").innerHTML=
"📅 "+card.dataset.date;


document.getElementById("modalText").innerHTML=
card.dataset.text;


};


});



document.querySelector(".close").onclick=()=>{

modal.style.display="none";

};



</script>



</body>

</html>
