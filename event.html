<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HUNT Events</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

background:#0b0b0b;

color:white;

font-family:Arial,sans-serif;

}


/* 제목 */

.header{

text-align:center;

font-size:34px;

font-weight:bold;

padding:25px;

}


/* 검색 */

.search-box{

width:90%;

margin:10px auto;

}


.search-box input{

width:100%;

padding:15px;

font-size:18px;

border-radius:12px;

border:none;

background:#222;

color:white;

}




/* 필터 */

.filters{

display:flex;

gap:10px;

justify-content:center;

margin:20px;

}


.filters button{

padding:10px 15px;

border:0;

border-radius:20px;

font-weight:bold;

cursor:pointer;

}




.all{

background:white;

}


.active{

background:#00ff66;

}


.upcoming{

background:#ffaa00;

}


.finished{

background:#777;

color:white;

}




/* 섹션 */

.section{

width:90%;

margin:30px auto;

font-size:25px;

font-weight:bold;

color:#00ff66;

}




/* 이벤트 카드 */

.event-card{

width:90%;

margin:20px auto;

background:#171717;

border-radius:18px;

overflow:hidden;

box-shadow:0 0 15px #000;

}



.event-card img{

width:100%;

height:240px;

object-fit:cover;

}




.info{

padding:20px;

}



.title{

font-size:26px;

font-weight:bold;

}



.status{

display:inline-block;

margin-top:10px;

padding:7px 15px;

border-radius:20px;

font-weight:bold;

background:#00ff66;

color:black;

}



.date{

margin-top:15px;

color:#aaa;

}



.description{

margin-top:15px;

line-height:1.6;

font-size:17px;

}




/* 영상 */

.video{

width:90%;

margin:40px auto;

}



.video iframe{

width:100%;

height:230px;

border-radius:15px;

border:0;

}




/* 변경내역 */

.changelog{

width:90%;

margin:30px auto;

background:#171717;

padding:20px;

border-radius:15px;

}



.version{

font-size:22px;

color:#00ff66;

font-weight:bold;

}


</style>


</head>



<body>


<div class="header">

🎉 HUNT Events

</div>



<div class="search-box">

<input 
type="text"
placeholder="🔍 이벤트 검색">

</div>



<div class="filters">

<button class="all">
전체
</button>

<button class="active">
🔥 진행중
</button>

<button class="upcoming">
⏳ 예정
</button>

<button class="finished">
✅ 종료
</button>

</div>





<div class="section">

🔥 진행중 이벤트

</div>



<div class="event-card">


<img src="images/event1.jpg">



<div class="info">


<div class="title">

🌊 심해 메갈로돈 이벤트

</div>


<div class="status">

진행중

</div>


<div class="date">

📅 기간 : 2026.08.01 ~ 2026.08.20

</div>



<div class="description">

심해에 등장한 거대한 메갈로돈을 사냥하세요.

<br><br>

🎁 보상

<br>

- 한정 아이템

<br>

- 이벤트 코인

<br>

- 특별 칭호

</div>



</div>


</div>





<div class="section">

⏳ 예정 이벤트

</div>



<div class="event-card">


<img src="images/event2.jpg">


<div class="info">


<div class="title">

❄️ 겨울 업데이트 이벤트

</div>


<div class="status">

예정

</div>


<div class="date">

📅 기간 : 2026.12.01 ~ 2026.12.30

</div>


</div>


</div>






<div class="section">

🎬 이벤트 영상

</div>


<div class="video">


<iframe

src="https://www.youtube.com/embed/영상ID">

</iframe>


</div>





<div class="changelog">


<div class="version">

📝 변경내역 v1.0.0

</div>


<br>

- 이벤트 페이지 추가

<br>

- 검색 기능 추가 예정

<br>

- 이벤트 필터 추가 예정


</div>

<script>


const searchInput =
document.querySelector(".search-box input");


const cards =
document.querySelectorAll(".event-card");


const buttons =
document.querySelectorAll(".filters button");



// 검색 기능

searchInput.addEventListener("input",function(){


let value=this.value.toLowerCase();



cards.forEach(card=>{


let text =
card.innerText.toLowerCase();



if(text.includes(value)){

card.style.display="block";

}

else{

card.style.display="none";

}


});


});





// 필터 기능


buttons.forEach(button=>{


button.addEventListener("click",()=>{


let type =
button.className;



cards.forEach(card=>{


let status =
card.dataset.status;



if(type=="all"){

card.style.display="block";

}


else if(status==type){

card.style.display="block";

}


else{

card.style.display="none";

}


});


});


});



</script>

</body>
  

</html>
