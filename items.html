<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HUNT - Items</title>

<style>
body {
    margin: 0;
    background: #0b0b0b;
    color: white;
    font-family: Arial, sans-serif;
}

.header {
    height: 70px;
    background: #111;
    display: flex;
    align-items: center;
    padding: 0 20px;
}

.logo {
    font-size: 35px;
    font-weight: 900;
    letter-spacing: 5px;
}

.back {
    margin-left: auto;
    color: white;
    text-decoration: none;
    background: #222;
    padding: 10px 20px;
    border-radius: 10px;
}

.title {
    text-align: center;
    margin: 40px 0;
    font-size: 40px;
}

.item-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 20px;
    padding: 20px;
}

.item-card {
    background: #171717;
    border: 1px solid #333;
    border-radius: 15px;
    padding: 25px;
    text-align: center;
}

.icon {
    font-size: 50px;
}

.name {
    font-size: 23px;
    font-weight: bold;
    margin: 15px;
}

.rarity {
    color: #ffd700;
}

.info {
    color: #aaa;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="header">
    <div class="logo">HUNT</div>
    <a class="back" href="index.html">HUNT</a>a>
</div>


<h1 class="title">🎒 ITEM</h1>


<div class="item-grid">

<div class="item-card">
<div class="icon">💤</div>
<div class="name">Nap's Nightmare의 칼날</div>
<div class="rarity">★★★★★</div>
<div class="info">Nap's Nightmare의 쟤료 중 하나</div>
</div>


<div class="item-card">
<div class="icon">💤</div>
<div class="name">Nap's Nightmare의 손잡이</div>
<div class="rarity">★★★★★</div>
<div class="info">Nap's Nightmare의 쟤료 중 일부</div>
</div>


<div class="item-card">
<div class="icon">🥚</div>
<div class="name">펫 알</div>
<div class="rarity">★★★</div>
<div class="info">새로운 펫을 획득</div>
</div>


<div class="item-card">
<div class="icon">🗺️</div>
<div class="name">고대 지도</div>
<div class="rarity">★★★★★</div>
<div class="info">숨겨진 장소를 발견</div>
</div>


<div class="item-card">
<div class="icon">🔥</div>
<div class="name">화산의 핵</div>
<div class="rarity">전설</div>
<div class="info">화산섬에서 발견되는 전설 아이템</div>
</div>


<div class="item-card">
<div class="icon">❄️</div>
<div class="name">빙결 결정</div>
<div class="rarity">전설</div>
<div class="info">북극 지역의 희귀 결정</div>
</div>


</div>

</body>
</html>
