<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HUNT 이벤트</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial,sans-serif;
}


/* 제목 */

.header{
height:70px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
}


/* 이벤트 카드 */

.event-card{

width:92%;
height:85vh;

margin:auto;

background:#151515;

border-radius:20px;

overflow-y:auto;

box-shadow:
0 0 20px #00ff66;

}


/* 이미지 */

.event-image{

width:100%;
height:45%;

object-fit:cover;

}


/* 내용 */

.event-content{

padding:20px;

}


.event-title{

font-size:28px;
font-weight:bold;

color:#00ff66;

}


.event-date{

color:#aaa;

margin-top:10px;

}


.event-text{

font-size:18px;

line-height:1.7;

margin-top:20px;

}


/* 버튼 */

.join-btn{

display:block;

margin-top:25px;

padding:15px;

text-align:center;

background:#00ff66;

color:black;

font-weight:bold;

border-radius:12px;

}


/* 영상 */

.video-box{

width:92%;

margin:30px auto;

}


.video-box iframe{

width:100%;

height:220px;

border-radius:15px;

}


</style>

</head>


<body>


<div class="header">
🎉 HUNT 이벤트
</div>



<div class="event-card">


<img class="event-image"
src="images/event1.jpg">



<div class="event-content">


<div class="event-title">
🔥 메갈로돈 사냥 이벤트
</div>


<div class="event-date">
기간 : 2026.08.01 ~ 2026.08.20
</div>



<div class="event-text">

바다 깊은 곳에서 나타난 거대한 메갈로돈!

이벤트 기간 동안 특별한 보상을 얻을 수 있습니다.


<br><br>


🎁 보상

<br>
- 한정 아이템
<br>
- 이벤트 코인
<br>
- 특별 칭호


<br><br>


⚔️ 참여 방법

<br>
심해 지역으로 이동하여
이벤트 보스를 처치하세요.


</div>



<div class="join-btn">
이벤트 참여하기
</div>


</div>

</div>




<!-- 영상 영역 -->

<div class="video-box">


<h2>
🎬 이벤트 영상
</h2>


<iframe

src="https://www.youtube.com/embed/영상ID"

allowfullscreen>

</iframe>


</div>



</body>
</html>
