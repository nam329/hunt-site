<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPC - HUNT</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

.logo{
    padding:20px;
    font-size:42px;
    font-weight:bold;
}

.logo a{
    color:white;
    text-decoration:none;
}

.logo a:hover{
    color:#00c853;
}

.title{
    text-align:center;
    font-size:40px;
}

.search{
    display:block;
    width:85%;
    max-width:500px;
    margin:25px auto;
    padding:15px;
    font-size:22px;
    border:none;
    border-radius:12px;
    background:#222;
    color:white;
}

.search::placeholder{
    color:#999;
}

.npc{
    background:#222;
    border:2px solid #333;
    border-radius:15px;
    margin:20px;
    padding:20px;
    transition:.2s;
}

.npc:hover{
    transform:scale(1.02);
    border-color:#00c853;
}

.npc h2{
    margin:0;
    font-size:30px;
}

.info{
    background:#181818;
    margin-top:15px;
    border-radius:10px;
    padding:15px;
    font-size:20px;
    line-height:1.8;
}

.role{
    margin-top:15px;
    color:#7CFC00;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="logo">
<a href="index.html">HUNT</a>
</div>

<h1 class="title">👤 NPC</h1>

<input
type="text"
id="search"
class="search"
placeholder="🔍 NPC 이름 검색..."
onkeyup="searchNPC()">

<div class="npc item">
<h2>🛒 상인</h2>

<div class="info">
아이템을 구매하거나 판매할 수 있습니다.

<div class="role">
역할 : 상점
</div>

</div>
</div>

<div class="npc item">
<h2>⚒️ 대장장이</h2>

<div class="info">
무기를 제작하고 강화할 수 있습니다.

<div class="role">
역할 : 제작
</div>

</div>
</div>

<div class="npc item">
<h2>📜 퀘스트 관리자</h2>

<div class="info">
메인 퀘스트와 일일 퀘스트를 제공합니다.

<div class="role">
역할 : 퀘스트
</div>

</div>
</div>

<div class="npc item">
<h2>🏹 사냥꾼</h2>

<div class="info">
사냥 팁과 몬스터 정보를 알려줍니다.

<div class="role">
역할 : 가이드
</div>

</div>
</div>

<div class="npc item">
<h2>💤 Nap</h2>

<div class="info">
공포의 Nap.

이세계에서의 어마어마한 퀘스트를 줍니다.

그의 비밀은 무엇이 있을까요?

또한 그가 주는 퀘스트는 무엇일까요?

<div class="role">
역할 : ??? (숨겨진 NPC)
</div>

</div>
</div>

<script>

function searchNPC(){

let input=document.getElementById("search").value.toLowerCase();

let items=document.getElementsByClassName("item");

for(let i=0;i<items.length;i++){

let name=items[i].getElementsByTagName("h2")[0].innerText.toLowerCase();

if(name.indexOf(input)>-1){

items[i].style.display="block";

}else{

items[i].style.display="none";

}

}

}

</script>

</body>
</html>
