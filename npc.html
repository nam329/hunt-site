<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPC - HUNT</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

.logo{
    padding:20px;
    font-size:42px;
    font-weight:bold;
}

.logo a{
    color:white;
    text-decoration:none;
}

.logo a:hover{
    color:#00c853;
}

h1{
    text-align:center;
    font-size:40px;
}

.npc{
    background:#222;
    margin:20px;
    padding:20px;
    border-radius:15px;
}

.npc h2{
    margin:0;
    font-size:30px;
}

.npc p{
    font-size:20px;
    color:#ddd;
}
</style>

</head>

<body>

<div class="logo">
    <a href="index.html">HUNT</a>
</div>

<h1>👤 NPC</h1>

<div class="npc">
    <h2>🛒 상인</h2>
    <p>아이템을 구매하거나 판매할 수 있습니다.</p>
</div>

<div class="npc">
    <h2>⚒️ 대장장이</h2>
    <p>무기를 제작하고 강화합니다.</p>
</div>

<div class="npc">
    <h2>📜 퀘스트 관리자</h2>
    <p>메인 퀘스트와 일일 퀘스트를 제공합니다.</p>
</div>

<div class="npc">
    <h2>🎣 낚시꾼</h2>
    <p>낚시 관련 아이템과 정보를 제공합니다.</p>
</div>

<div class="npc">
    <h2>🏹 사냥꾼</h2>
    <p>사냥 팁과 몬스터 정보를 알려줍니다.</p>
</div>
  
<div class="npc">
    <h2>💤 Nap</h2>
    <p>공포의 Nap 이세계에서의 어마한 퀘스트를 줍니다.</p>
</div>

</body>
</html>
