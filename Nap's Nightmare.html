<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nap's Nightmare </title>

<style>
body{
    margin:0;
    background:#1d1f22;
    font-family:Arial,Helvetica,sans-serif;
    color:white;
}

.container{
    width:90%;
    max-width:700px;
    margin:30px auto;
}

button{
    background:#2f3136;
    color:white;
    border:none;
    padding:12px 25px;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
}

button.active{
    background:#22c55e;
}

.card{
    margin-top:15px;
    background:#2b2d31;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 15px rgba(0,0,0,.5);
}

.title{
    background:#111;
    text-align:center;
    padding:22px;
    font-size:32px;
    font-weight:bold;
}

.section{
    padding:20px;
}

.sectionTitle{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    border-radius:10px;
    margin-bottom:20px;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid #444;
}

.row:last-child{
    border:none;
}

.label{
    font-size:22px;
    font-weight:bold;
}

.value{
    font-size:22px;
    color:#d6d6d6;
}

.blue{
    color:#6ba8ff;
}

.gold{
    color:#f1d56b;
}
</style>

</head>
<body>

<div class="container">

<button id="huntButton">HUNT</button>

<div class="card">

<div class="title">
Nap's Nightmare
</div>

<div class="section">

<div class="sectionTitle">
Information
</div>

<div class="row">
<div class="label">Journal</div>
<div class="value blue">Nightmare Forest</div>
</div>

<div class="row">
<div class="label">Source</div>
<div class="value">Nap's Quest Reward</div>
</div>

<div class="row">
<div class="label">Stage</div>
<div class="value blue">Stage 5</div>
</div>

</div>

<div class="section">

<div class="sectionTitle">
Stats
</div>

<div class="row">
<div class="label">Damage</div>
<div class="value">200</div>
</div>

<div class="row">
<div class="label">Range</div>
<div class="value">30m</div>
</div>

<div class="row">
<div class="label">Cooldown</div>
<div class="value">1s</div>
</div>

<div class="row">
<div class="label">Acquisition</div>
<div class="value">Quest Item </div>
</div>

<div class="row">
<div class="label">Difficulty</div>
<div class="value">Nightmare</div>
</div>

</div>

</div>

</div>

<script>
const huntButton = document.getElementById("huntButton");

huntButton.onclick = function(){
    huntButton.classList.toggle("active");
}
</script>

</body>
</html>
