<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nap's Nightmare knob</title>

<style>
body{
    margin:0;
    background:#1e1f22;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}

.container{
    max-width:700px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:#2a2b2f;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 15px rgba(0,0,0,.4);
}

.title{
    background:#111;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    padding:20px;
}

.section{
    padding:20px;
}

.section-title{
    background:#111;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #3a3b40;
}

.row:last-child{
    border:none;
}

.label{
    font-weight:bold;
    font-size:22px;
}

.value{
    font-size:22px;
    color:#dcdcdc;
}

.blue{
    color:#67a8ff;
}

.gold{
    color:#e6d46c;
}

.color-box{
    width:28px;
    height:28px;
    border-radius:5px;
    display:inline-block;
    margin-right:10px;
    border:1px solid #555;
    vertical-align:middle;
}
</style>

</head>
<body>

<div class="container">

<div class="card">

<div class="title">
Nap's Nightmare knob 
</div>

<div class="section">

<div class="section-title">Information</div>

<div class="row">
<span class="label">Journal</span>
<span class="value blue">Northern Summit (500 XP)</span>
</div>

<div class="row">
<span class="label">Source</span>
<span class="value">Purchasing</span>
</div>

<div class="row">
<span class="label">Price</span>
<span class="value gold">25,000C$</span>
</div>

<div class="row">
<span class="label">Stage</span>
<span class="value blue">Stage 3</span>
</div>

</div>

<div class="section">

<div class="section-title">Stats</div>

<div class="row">
<span class="label">Lure Speed</span>
<span class="value">25%</span>
</div>

<div class="row">
<span class="label">Luck</span>
<span class="value">45%</span>
</div>

<div class="row">
<span class="label">Control</span>
<span class="value">0.06</span>
</div>

<div class="row">
<span class="label">Resilience</span>
<span class="value">15%</span>
</div>

<div class="row">
<span class="label">Max Kg</span>
<span class="value">7,500kg</span>
</div>

<div class="row">
<span class="label">Line Dist.</span>
<span class="value">70m</span>
</div>

</div>

<div class="section">

<div class="section-title">Colors</div>

<div class="row">
<span class="label">Menu</span>
<span class="value">
<span class="color-box" style="background:#9aaabe;"></span>
#9aaabe
</span>
</div>

<div class="row">
<span class="label">Bobber</span>
<span class="value">
<span class="color-box" style="background:#862626;"></span>
#862626
</span>
</div>

<div class="row">
<span class="label"></span>
<span class="value">
<span class="color-box" style="background:#ffffff;"></span>
#ffffff
</span>
</div>

</div>

</div>

</div>

</body>
</html>
