<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SKIN - Raven's Good Dream</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial, sans-serif;
}


/* HUNT 왼쪽 위 고정 */
#huntBtn{
    position:fixed;
    top:20px;
    left:20px;

    z-index:999;

    width:150px;
    height:55px;

    background:#111;
    color:white;

    border:3px solid #555;

    font-size:22px;
    font-weight:bold;

    cursor:pointer;
}


/* 제목 */
.title{

    text-align:center;

    font-size:45px;

    margin-top:80px;

}



/* 전체 화면 스킨 박스 */
.skin-container{

    width:95%;

    min-height:850px;

    margin:30px auto;

    border:4px solid #444;

    background:#151515;

    padding:40px;

    text-align:center;

}



/* 큰 가로 이미지 */
.skin-image{

    width:90vw;

    max-width:1200px;

    height:450px;


    object-fit:cover;


    border:4px solid #555;

    background:#222;

}



/* 이름 */
.skin-name{

    font-size:35px;

    margin:35px;

}


/* 정보 */
.info{

    font-size:22px;

    line-height:2;

}



/* 변경사항 */
.changes{

    margin:40px auto;

    width:90%;

    border:3px solid #444;

}



.change-button{

    width:100%;

    height:60px;

    background:#222;

    color:white;

    border:none;

    font-size:22px;

    cursor:pointer;

    text-align:left;

    padding-left:20px;

}



#changeList{

    max-height:180px;

    overflow-y:auto;

    padding:20px;

    background:#080808;

    display:none;

    text-align:left;

    font-size:18px;

}



/* 이동 버튼 */

.move-button{

    width:300px;

    height:60px;

    margin:15px;

    background:#222;

    color:white;

    border:3px solid #555;

    font-size:20px;

    cursor:pointer;

}



.move-button:hover{

    background:#444;

}


</style>

</head>


<body>


<button id="huntBtn">
HUNT
</button>



<h1 class="title">
SKIN
</h1>



<div class="skin-container">


<img src="assets/skins/RavenGoodDream.png"
class="skin-image">



<div class="skin-name">
Raven's Good Dream
</div>



<div class="info">

종류 : 퀘스트 스킨

<br>

획득 방법

<br>

Raven's Good Dream 퀘스트 완료

</div>





<div class="changes">


<button class="change-button"
onclick="toggleChanges()">

스킨 변경사항 ▼

</button>



<div id="changeList">

<p>- 스킨 이미지 변경</p>

<p>- 새로운 이펙트 추가</p>

<p>- 색상 변경</p>

<p>- 전용 효과 추가</p>


</div>


</div>





<button class="move-button"
onclick="location.href='skin.html'">

skin으로 가기

</button>



<button class="move-button"
onclick="location.href='naps-nightmare.html'">

Nap's Nightmare

</button>



</div>





<script>


// HUNT 이동

document.getElementById("huntBtn").onclick=function(){

    this.style.backgroundColor="green";


    setTimeout(()=>{

        location.href="index.html";

    },300);

};



// 변경사항 접기/펼치기

function toggleChanges(){

let box=document.getElementById("changeList");


if(box.style.display==="block"){

    box.style.display="none";

}else{

    box.style.display="block";

}


}


</script>


</body>
</html>
