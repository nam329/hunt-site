<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SKIN</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial, sans-serif;
}


/* HUNT 왼쪽 위 고정 */
#huntBtn{
    position:fixed;
    top:20px;
    left:20px;

    z-index:999;

    background:none;
    border:none;

    color:white;

    font-size:28px;
    font-weight:bold;

    cursor:pointer;
}


/* SKIN 제목 */
.title{
    text-align:center;
    margin-top:80px;
    font-size:50px;
}



/* 전체 화면 */
.skin-container{

    width:95%;
    min-height:900px;

    margin:30px auto;

    border:4px solid #444;

    background:#151515;

    padding:40px;

    text-align:center;
}



/* 스킨 이미지 */
.skin-image{

    width:90vw;
    max-width:1200px;

    height:700px;

    object-fit:cover;

    border:4px solid #555;

    background:#222;
}



/* 스킨 이름 */
.skin-name{

    font-size:38px;

    margin:35px;
}



/* 정보 */
.info{

    font-size:24px;

    line-height:2;
}



/* 변경사항 */
.changes{

    width:90%;

    margin:40px auto;

    border:3px solid #444;
}



.change-button{

    width:100%;

    height:60px;

    background:#222;

    color:white;

    border:none;

    font-size:22px;

    text-align:left;

    padding-left:20px;

    cursor:pointer;
}



#changeList{

    max-height:200px;

    overflow-y:auto;

    display:none;

    background:#080808;

    padding:20px;

    text-align:left;

}



/* 이동 버튼 */

.move-button{

    width:300px;

    height:60px;

    margin:15px;

    background:#222;

    color:white;

    border:3px solid #555;

    font-size:20px;

    cursor:pointer;

}

</style>

</head>


<body>


<button id="huntBtn">
HUNT
</button>



<h1 class="title">
SKIN
</h1>



<div class="skin-container">


<img src="assets/skins/RavenGoodDream.png"
class="skin-image">



<div class="skin-name">
Raven's Good Dream
</div>



<div class="info">

종류 : 퀘스트 스킨

<br>

획득 방법

<br>

Raven's Good Dream 퀘스트 완료

</div>




<div class="changes">


<button class="change-button"
onclick="toggleChanges()">

스킨 변경사항 ▼

</button>


<div id="changeList">

<p>- 스킨 이미지 변경</p>

<p>- 새로운 효과 추가</p>

<p>- 색상 변경</p>

<p>- 전용 이펙트 추가</p>

</div>


</div>





<button class="move-button"
onclick="location.href='skin.html'">

skin으로 가기

</button>



<button class="move-button"
onclick="location.href='naps-nightmare.html'">

Nap's Nightmare

</button>



</div>





<script>


// HUNT 클릭 효과

let hunt = document.getElementById("huntBtn");


hunt.onclick=function(){

    hunt.style.color="lime";


    setTimeout(function(){

        hunt.style.color="white";

        location.href="index.html";

    },500);

};




// 변경사항 펼치기/접기

function toggleChanges(){

let list=document.getElementById("changeList");


if(list.style.display==="block"){

    list.style.display="none";

}else{

    list.style.display="block";

}

}


</script>


</body>
</html>
