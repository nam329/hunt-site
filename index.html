<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  background:#0b0b0b;
  font-family:Arial, sans-serif;
}

/* 상단바 */
.topbar {
  height:70px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

/* HUNT 로고 */
.logo {
  color:white;
  font-size:32px;
  font-weight:900;
}

/* 버튼 */
.buttons a {
  text-decoration:none;
  color:white;
  padding:12px 18px;
  margin-left:10px;
  border-radius:12px;
  font-weight:bold;
}

/* 플레이 버튼 */
.play {
  background:#00aaff;
}

/* 소식 버튼 */
.news {
  background:#333;
}

/* 메인 */
.main {
  color:white;
  text-align:center;
  padding:80px 20px;
}

.main h1 {
  font-size:50px;
}

.main p {
  color:#aaa;
}
</style>

</head>

<body>

<header class="topbar">

<div class="logo">
HUNT
</div>

<div class="buttons">

<a class="play" href="#">
🎮 HUNT 플레이
</a>

<a class="news" href="news.html">
📢 소식
</a>

</div>

</header>


<div class="main">

<h1>HUNT</h1>

<p>
새로운 탐험의 시작
</p>

</div>

</body>
</html>
