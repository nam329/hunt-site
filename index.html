<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUNT</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

.logo{
    padding:20px;
    font-size:42px;
    font-weight:bold;
}

.logo a{
    color:white;
    text-decoration:none;
}

.making{
    text-align:center;
    font-size:38px;
    color:red;
    font-weight:bold;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0.3;}
}

.menu{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:30px 20px;
}

.menu button{
    width:100%;
    height:100px;
    font-size:24px;
    font-weight:bold;
    border:none;
    border-radius:15px;
    background:#222;
    color:white;
}

.menu button:hover{
    background:#333;
}

.update-title{
    font-size:30px;
    margin:20px;
}

.update{
    background:#222;
    margin:20px;
    padding:20px;
    border-radius:15px;
    border-left:5px solid #00c853;
}

@media(min-width:900px){
.menu{
grid-template-columns:repeat(4,1fr);
}
}
</style>

</head>
