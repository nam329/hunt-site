<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HUNT 공식 사이트</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#101010;
color:white;
font-family:Arial,sans-serif;
}


/* 상단바 */

.topbar{

height:70px;
background:#050505;

display:flex;
align-items:center;

padding:0 20px;

position:sticky;
top:0;

z-index:1000;

}


.menu-btn{

font-size:35px;
cursor:pointer;

margin-right:20px;

}


.logo a{

font-size:35px;
font-weight:bold;

color:#00ff66;

text-decoration:none;

}



/* 사이드 메뉴 */

.sidebar{

position:fixed;

top:0;
left:-300px;

width:300px;
height:100%;

background:#171717;

padding-top:80px;

transition:0.3s;

z-index:2000;

}


.sidebar.active{

left:0;

}


.sidebar a{

display:block;

padding:18px;

font-size:20px;

color:white;

text-decoration:none;

}


.sidebar a:hover{

background:#00ff66;

color:black;

}



/* 메인 */

.container{

padding:20px;

}


/* 메인 이미지 */

.main-image{

width:100%;
height:350px;

background:#222;

border-radius:20px;

display:flex;

justify-content:center;
align-items:center;

font-size:30px;

margin-bottom:25px;

}



/* 카드 */

.card{

background:#1b1b1b;

border-radius:20px;

padding:20px;

margin-bottom:25px;

}



/* 버튼 */

.menu{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

}


.menu a{

background:#242424;

padding:25px;

border-radius:15px;

text-align:center;

font-size:20px;

font-weight:bold;

color:white;

text-decoration:none;

}


.menu a:hover{

background:#00ff66;

color:black;

}



/* 미리보기 카드 */

.preview-card{

display:block;

background:#1b1b1b;

border-radius:20px;

overflow:hidden;

text-decoration:none;

color:white;

margin-bottom:20px;

}


.preview-card img{

width:100%;

height:180px;

object-fit:cover;

}


.preview-text{

padding:15px;

}


</style>

</head>


<body>
