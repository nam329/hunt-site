<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HUNT</title>

<style>

body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial,sans-serif;
}


/* 상단 */
.topbar{
    height:70px;
    background:#111;
    display:flex;
    align-items:center;
    padding:0 20px;
    position:sticky;
    top:0;
}

.logo a{
    color:white;
    text-decoration:none;
    font-size:35px;
    font-weight:900;
    letter-spacing:5px;
}


/* 메인 */
.hero{
    height:500px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:60px;
}

.play{
    background:#00ff66;
    color:black;
    padding:18px 50px;
    border-radius:15px;
    font-size:25px;
    font-weight:bold;
    text-decoration:none;
}


/* 버튼 영역 */
.menu-section{
    padding:40px 20px;
    text-align:center;
}

.menu-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:20px;
}

.menu{
    background:#181818;
    padding:25px;
    border-radius:15px;
    text-decoration:none;
    color:white;
    font-size:20px;
}


/* 공통 파트 */
.part{
    padding:40px 20px;
}

.title{
    font-size:35px;
    margin-bottom:20px;
}


/* 업데이트 */
.update{
    background:#151515;
    padding:25px;
    border-radius:15px;
}


/* 이벤트 */
.event{
    background:#151515;
    padding:25px;
    border-radius:15px;
    border:1px solid #333;
}


</style>

</head>


<body>


<div class="topbar">

<div class="logo">
<a href="index.html">HUNT</a>
</div>

</div>



<section class="hero">

<h1>HUNT</h1>

<p>Explore. Hunt. Discover.</p>

<a class="play" href="#">PLAY</a>

</section>




<!-- 아래로 내리면 나오는 버튼 -->

<section class="menu-section">

<h2 class="title">MENU</h2>


<div class="menu-grid">

<a class="menu" href="items.html">
🎒 아이템
</a>


<a class="menu" href="#">
🗺️ 맵
</a>


<a class="menu" href="#">
🐾 펫
</a>


<a class="menu" href="#">
🏆 랭킹
</a>


<a class="menu" href="#">
📰 소식
</a>


</div>

</section>





<!-- 최신 업데이트 -->

<section class="part">

<h2 class="title">
🔥 최신 업데이트
</h2>


<div class="update">

<h3>
UPDATE 1.0.1
</h3>

<p>
새로운 지역 추가<br>
새로운 아이템 추가<br>
게임 최적화 개선
</p>

</div>


</section>





<!-- 이벤트 -->

<section class="part">


<h2 class="title">
🎉 이벤트
</h2>


<div class="event">

<h3>
현재 진행중 이벤트
</h3>


<p>
🌟 신규 탐험 이벤트<br><br>

기간 : 2026.07.20 ~ 2026.08.10<br><br>

특별 보상과 희귀 아이템 획득 가능!
</p>


</div>


</section>




</body>
</html>
