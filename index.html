<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HUNT 공식 홈페이지</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0b0b0b;
    color:white;
}


/* 상단바 */
.topbar{
    height:70px;
    background:#111;
    display:flex;
    align-items:center;
    padding:0 20px;
    position:fixed;
    width:100%;
    top:0;
    z-index:10;
}

.menu-btn{
    font-size:30px;
    cursor:pointer;
}

.logo{
    margin-left:25px;
    font-size:32px;
    font-weight:bold;
}

.logo a{
    color:white;
    text-decoration:none;
}


/* 사이드 메뉴 */
.sidebar{
    position:fixed;
    top:0;
    left:-260px;
    width:260px;
    height:100%;
    background:#151515;
    padding-top:80px;
    transition:0.3s;
    z-index:20;
}

.sidebar a{
    display:block;
    padding:20px;
    color:white;
    text-decoration:none;
    font-size:18px;
}

.sidebar a:hover{
    background:#333;
}

.open{
    left:0;
}



/* 메인 */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:
    linear-gradient(
    rgba(0,0,0,.5),
    rgba(0,0,0,.8)),
    url("hunt.jpg");

    background-size:cover;
}


.hero h1{
    font-size:80px;
}

.hero p{
    font-size:22px;
    margin:20px;
}


button{
    padding:15px 35px;
    border:none;
    background:#00ff88;
    color:black;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}


/* 정보 */
.section{
    padding:80px 20px;
    text-align:center;
}

.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    background:#1b1b1b;
    width:250px;
    padding:30px;
    border-radius:15px;
}


@media(max-width:600px){

.hero h1{
    font-size:50px;
}

.logo{
    font-size:25px;
}

}

</style>

</head>


<body>


<div class="topbar">

<span class="menu-btn" onclick="openMenu()">☰</span>

<div class="logo">
<a href="#">HUNT</a>
</div>

</div>



<div id="menu" class="sidebar">

<a href="#">🏠 홈</a>

<a href="#">🎮 플레이</a>

<a href="#">📰 소식</a>

<a href="#">🛒 상점</a>

<a href="#">💬 커뮤니티</a>

</div>



<section class="hero">

<div>

<h1>HUNT</h1>

<p>
최고의 사냥 모험을 시작하세요
</p>

<button>
게임 시작
</button>

</div>

</section>




<section class="section">

<h2>HUNT</h2>

<br>

<div class="cards">


<div class="card">
<h3>🌎 탐험</h3>
<p>
새로운 지역을 발견하세요
</p>
</div>


<div class="card">
<h3>🐾 펫</h3>
<p>
귀여운 동료와 함께하세요
</p>
</div>


<div class="card">
<h3>🏆 보상</h3>
<p>
희귀 아이템을 획득하세요
</p>
</div>


</div>

</section>



<script>

function openMenu(){

document
.getElementById("menu")
.classList.toggle("open");

}

</script>


</body>
</html>
