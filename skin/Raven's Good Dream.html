<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SKIN - Raven's Good Dream</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#080808;
    color:white;
    font-family:Arial, sans-serif;
}


/* HUNT */
#huntBtn{

    position:fixed;

    top:15px;
    left:20px;

    z-index:999;

    background:none;
    border:none;

    color:white;

    font-size:45px;

    font-weight:bold;

    cursor:pointer;
}



/* SKIN 제목 */

.title{

    text-align:center;

    margin-top:110px;

    font-size:70px;

    font-weight:bold;

}



/* 전체 화면 */

.skin-container{

    width:95%;

    min-height:1000px;

    margin:30px auto;

    background:#111;

    border:4px solid #333;

    padding:40px;

    text-align:center;

}



/* 스킨 이미지 */

.skin-image{

    width:90vw;

    max-width:1300px;

    height:700px;


    object-fit:cover;


    border:5px solid #8a2be2;


    box-shadow:

    0 0 15px #8a2be2,

    0 0 35px #8a2be2,

    0 0 70px #00ffff;


    background:#222;

}



/* 스킨 이름 */

.skin-name{

    margin:40px;

    font-size:42px;

    font-weight:bold;

}



/* 정보 */

.info{

    font-size:26px;

    line-height:2;

}



/* 변경사항 */

.changes{

    width:90%;

    margin:50px auto;

    border:3px solid #444;

}



.change-button{

    width:100%;

    height:70px;

    background:#222;

    color:white;

    border:none;

    font-size:25px;

    text-align:left;

    padding-left:25px;

    cursor:pointer;

}



#changeList{

    display:none;

    max-height:220px;

    overflow-y:auto;

    background:#050505;

    padding:25px;

    text-align:left;

    font-size:22px;

}



/* 이동 버튼 */

.move-button{

    width:350px;

    height:70px;

    margin:15px;

    background:#222;

    color:white;

    border:3px solid #555;

    font-size:24px;

    cursor:pointer;

}


.move-button:hover{

    background:#444;

}



</style>

</head>



<body>



<button id="huntBtn">
HUNT
</button>



<h1 class="title">
SKIN
</h1>




<div class="skin-container">



<img src="1784300167307.jpg"
class="skin-image">



<div class="skin-name">
Raven's Good Dream
</div>



<div class="info">

종류 : 퀘스트 스킨

<br><br>

획득 방법

<br>

Raven's Good Dream 퀘스트 완료

</div>





<div class="changes">


<button class="change-button"
onclick="toggleChanges()">

✦ 스킨 변경사항 ▼

</button>



<div id="changeList">

<p>- 스킨 이미지 변경</p>

<p>- 새로운 효과 추가</p>

<p>- 색상 변경</p>

<p>- 전용 애니메이션 추가</p>

<p>- 업데이트 기록 추가</p>


</div>


</div>





<button class="move-button"
onclick="location.href='skin.html'">

skin으로 가기

</button>



<button class="move-button"
onclick="location.href='naps-nightmare.html'">

Nap's Nightmare

</button>



</div>






<script>


// HUNT 효과

let hunt=document.getElementById("huntBtn");


hunt.onclick=function(){


    hunt.style.color="lime";


    setTimeout(()=>{


        hunt.style.color="white";


        location.href="index.html";


    },500);


};




// 변경사항 열기/닫기

function toggleChanges(){


let list=document.getElementById("changeList");


if(list.style.display=="block"){


    list.style.display="none";


}else{


    list.style.display="block";


}


}


</script>



</body>
</html>
