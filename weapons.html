</style>


</head>

<script>


function filterWeapon(){


let search =
document.getElementById("search").value.toLowerCase();


let grade =
document.getElementById("grade").value;


let type =
document.getElementById("type").value;



let rows =
document.querySelectorAll("#weaponTable tr");



for(let i=1;i<rows.length;i++){


let name =
rows[i].children[0].innerText.toLowerCase();


let weaponGrade =
rows[i].children[1].className;


let weaponType =
rows[i].children[2].innerText;



if(
name.includes(search)
&&
(grade=="" || weaponGrade==grade)
&&
(type=="" || weaponType==type)

){

rows[i].style.display="";

}

else{

rows[i].style.display="none";

}



}



}



</script>
