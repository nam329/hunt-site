<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HUNT 무기 도감</title>


<style>

/* 기본 */

body{

margin:0;
background:#080808;
color:white;
font-family:Arial,sans-serif;

}



/* 상단 */

.topbar{

height:70px;
background:#111;
display:flex;
align-items:center;
padding-left:20px;
border-bottom:1px solid #333;

}


.logo{

font-size:38px;
font-weight:bold;
color:#00ff66;
text-decoration:none;

}




.container{

padding:25px;

}



.title{

text-align:center;
font-size:35px;
color:#00ff66;
margin-bottom:30px;

}



/* 검색 */

.search{

width:100%;
box-sizing:border-box;
padding:16px;
font-size:18px;

background:#151515;
color:white;

border:1px solid #444;
border-radius:10px;

}





/* 필터 */

.filter-box{

margin-top:25px;
background:#111;

padding:20px;
border-radius:12px;
border:1px solid #333;

}



.filter-title{

font-size:22px;
font-weight:bold;
color:#00ff66;
margin-bottom:15px;

}



button{

padding:12px 16px;
margin:5px;

background:#1b1b1b;
color:white;

border:1px solid #444;
border-radius:10px;

font-size:15px;
cursor:pointer;

}


button:hover{

background:#00aa55;

}




/* 펼치기 */

.weapon-box,
.change-box{

margin-top:35px;

background:#111;
border:1px solid #333;

border-radius:12px;

padding:18px;

}



summary{

font-size:25px;
font-weight:bold;

color:#00ff66;

cursor:pointer;

}





/* 표 가로 스크롤 */

.table-scroll{

overflow-x:auto;

margin-top:20px;

}




#weapons{

border-collapse:collapse;

min-width:1000px;

width:100%;

}



#weapons th{

background:#00aa55;

font-size:18px;

padding:20px;

}



#weapons td{

text-align:center;

padding:22px;

font-size:17px;

border-bottom:1px solid #333;

}




#weapons tr:hover{

background:#1b1b1b;

}




#weapons td:nth-child(1){

min-width:180px;

}



#weapons td:nth-child(4){

min-width:250px;

}



#weapons td:nth-child(6){

min-width:130px;

}




a{

color:white;
text-decoration:none;

font-weight:bold;

}




/* 등급 */

.일반{
color:#ddd;
}


.언커먼{

color:#00ff66;

}


.희귀{

color:#3399ff;

}


.초희귀{

color:#66ccff;

}


.에픽{

color:#bb55ff;

}


.전설{

color:#ff9900;

}


.신화{

color:red;

}


.비밀{

color:#ff66ff;

}


.고대{

color:#ffd700;

}


.초월{

color:#00ffff;

}





/* 변경내역 */

.change-list{

max-height:250px;

overflow-y:auto;

padding-right:10px;

}




.change-list h3{

color:#00ff66;

}



</style>


</head>
