<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무기 도감 - HUNT</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

.logo{
    padding:20px;
    font-size:42px;
    font-weight:bold;
}

.logo a{
    color:white;
    text-decoration:none;
}

.logo a:hover{
    color:#00c853;
}

.title{
    text-align:center;
    font-size:40px;
    margin-bottom:30px;
}

.weapon{
    background:#222;
    border:2px solid #333;
    border-radius:15px;
    margin:20px;
    padding:20px;
}

.weapon h2{
    margin-top:0;
    font-size:32px;
}

.info{
    background:#181818;
    border-radius:10px;
    padding:15px;
    margin-top:15px;
    font-size:20px;
    line-height:1.8;
}

.stat{
    margin-top:10px;
    color:#7CFC00;
}
</style>

</head>

<body>

<div class="logo">
<a href="index.html">HUNT</a>
</div>

<h1 class="title">⚔️ 무기 도감</h1>

<div class="weapon">
<h2>🗡️ 나무 검</h2>

<div class="info">
설명:<br>
초보 사냥꾼이 사용하는 기본 무기입니다.

<div class="stat">
공격력 : 10<br>
희귀도 : 일반
</div>

</div>
</div>

<div class="weapon">
<h2>⚔️ 철 검</h2>

<div class="info">
설명:<br>
튼튼한 철로 제작된 검입니다.

<div class="stat">
공격력 : 30<br>
희귀도 : 희귀
</div>

</div>
</div>

<div class="weapon">
<h2>🏹 사냥 활</h2>

<div class="info">
설명:<br>
멀리 있는 동물을 안전하게 공격할 수 있습니다.

<div class="stat">
공격력 : 25<br>
희귀도 : 희귀
</div>

</div>
</div>

<div class="weapon">
<h2>🪓 전투 도끼</h2>

<div class="info">
설명:<br>
강력한 한 방을 가진 무기입니다.

<div class="stat">
공격력 : 45<br>
희귀도 : 에픽
</div>

</div>
</div>

</body>
</html>
