<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Raven's Good Dream</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
}


/* 왼쪽 위 고정 HUNT */
#huntBtn{
    position:fixed;
    top:20px;
    left:20px;
    z-index:999;

    padding:12px 30px;
    background:black;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}


/* 제목 */
.title{
    text-align:center;
    margin-top:80px;
    font-size:40px;
}


/* 스킨 정보 카드 */
.skin-box{
    width:350px;
    margin:40px auto;
    padding:25px;

    background:#222;
    border-radius:20px;
    text-align:center;
}


/* 스킨 이미지 */
.skin-image{
    width:250px;
    height:250px;

    object-fit:cover;
    border-radius:15px;

    background:#333;
}


/* 버튼 */
.move-btn{
    width:90%;
    padding:12px;
    margin-top:15px;

    background:#333;
    color:white;

    border:none;
    border-radius:10px;

    font-size:16px;
    cursor:pointer;
}

.move-btn:hover{
    background:#555;
}

</style>
</head>


<body>


<button id="huntBtn">
HUNT
</button>



<h1 class="title">
SKIN
</h1>



<div class="skin-box">


<img src="assets/skins/RavenGoodDream.png"
class="skin-image">



<h2>
Raven's Good Dream
</h2>


<p>
등급 : ★★★★★
</p>


<p>
종류 : 퀘스트 스킨
</p>



<p>
획득 방법
</p>

<p>
Raven's Good Dream<br>
퀘스트 완료
</p>



<button class="move-btn"
onclick="location.href='skin.html'">
skin으로 가기
</button>



<button class="move-btn"
onclick="location.href='naps-nightmare.html'">
Nap's Nightmare
</button>


</div>




<script>

let hunt = document.getElementById("huntBtn");


hunt.onclick=function(){

    hunt.style.backgroundColor="green";


    setTimeout(function(){

        location.href="index.html";

    },300);

}

</script>


</body>
</html>
